name: smart_ac
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+4

environment:
  sdk: ^3.9.2
#  sdk:  3.11.1
#  flutter: 3.41.4
dependencies:
  flutter:
    sdk: flutter
  # tools
  logger: 2.6.1
  equatable: 2.0.7
  injectable: 2.5.2
  flutter_hooks: 0.21.3
  freezed_annotation: 3.1.0
  intl: 0.20.2

  # state management
  bloc: 9.0.0
  flutter_bloc: 9.1.1
  firebase_core: 4.4.0
#  firebase_ai: 3.8.0

  fluttertoast: 8.2.12
  path_provider: 2.1.5
  url_launcher: 6.3.2
  multi_dropdown: 3.0.1
  pdfrx: 2.2.8
  share_plus: 12.0.1
  markdown_widget: 2.3.2+8
  get_it: 7.2.0
  speech_to_text: 7.3.0
#  flutter_tts: 4.2.5

#  //////////////////////////////////////////
#  /////////////////////////////////////////
#  /////////////////////////////////////////
#  /////////////////////////////////////////

  http: ^1.2.0
  provider: ^6.1.2
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  gap: ^3.0.1
#  /////////////////////////////////////////
#  /////////////////////////////////////////
#  /////////////////////////////////////////
#  /////////////////////////////////////////

  # internal
  kernel:
  domain:
  data:

  # navigation
  go_router: 16.2.4
  flutter_svg: 2.2.1

  #image picker
  image_picker: 1.2.0

dev_dependencies:

  flutter_test:
    sdk: flutter
  build_runner: 2.7.1
  flutter_lints: 6.0.0
  bloc_test: 10.0.0
  mocktail: 1.0.4
  faker: 2.2.0

  # tools
  freezed: 3.2.0
  injectable_generator: 2.8.1

  # linter
  analyzer: 7.7.1
#  rename_app: 1.6.5
  flutter_launcher_icons: 0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#F0F4FF"
    theme_color: "#3B82F6"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
  fonts:
    - family: SFPro
      fonts:
        - asset: assets/fonts/SF-Pro-Text-Light.otf
          weight: 300
        - asset: assets/fonts/SF-Pro-Text-Regular.otf
          weight: 400
        - asset: assets/fonts/SF-Pro-Text-Medium.otf
          weight: 500
        - asset: assets/fonts/SF-Pro-Text-SemiBold.otf
          weight: 600
        - asset: assets/fonts/SF-Pro-Text-Bold.otf
          weight: 700

workspace:
  - packages/domain
  - packages/data
  - packages/kernel