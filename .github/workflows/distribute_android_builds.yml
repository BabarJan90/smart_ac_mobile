# .github/workflows/distribute_android_builds.yml
name: Android App Build

on:
  workflow_call:
    inputs:
      version:
        description: 'Version Number (e.g. 1.0.10)'
        required: true
        type: string
      buildNumber:
        description: 'Build Number (e.g. 82)'
        required: true
        type: string
      buildType:
        description: 'Build Type (Staging or Release)'
        required: true
        type: string

run-name: "SmartAc Android - ${{ inputs.buildType }} Build ${{ inputs.version }}+${{ inputs.buildNumber }}"

jobs:
  mobile_app_build:
    name: Build & Distribute Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: make get
      - name: Generate code
        run: make gen

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/smart_ac.keystore

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name=${{ inputs.version }} \
            --build-number=${{ inputs.buildNumber }} \
            --dart-define=ENV=${{ inputs.buildType }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "SmartAc ${{ inputs.buildType }} build ${{ inputs.version }}+${{ inputs.buildNumber }}"